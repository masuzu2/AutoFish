<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoFish</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Nunito'],mono:['JetBrains Mono']}}}}</script>
<style>
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#fdf2f8 50%,#f0fdf4 100%);margin:0;min-height:100vh;user-select:none}
  .card{background:white;border-radius:20px;box-shadow:0 2px 16px rgba(0,0,0,0.04);border:2px solid #f1f5f9;transition:all 0.2s ease}
  .card:hover{box-shadow:0 4px 24px rgba(0,0,0,0.07);transform:translateY(-1px)}
  .btn{border-radius:14px;font-weight:700;cursor:pointer;transition:all 0.15s ease;border:none;font-family:'Nunito'}
  .btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
  .btn:active{transform:scale(0.96)}
  input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#e2e8f0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
  .r-b::-webkit-slider-thumb{background:#60a5fa}
  .r-g::-webkit-slider-thumb{background:#4ade80}
  .tog{width:40px;height:22px;border-radius:11px;background:#e2e8f0;position:relative;cursor:pointer;transition:all 0.25s ease}
  .tog.on{background:#60a5fa}
  .tog::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:2px;left:2px;transition:all 0.25s ease;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
  .tog.on::after{transform:translateX(18px)}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}.pulse{animation:pulse 1.5s ease infinite}
  @keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}.pop{animation:pop 0.2s ease}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>
<div class="max-w-[480px] mx-auto px-5 py-6 space-y-3">

  <!-- Header -->
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-center gap-3">
      <div class="text-4xl" style="animation:bounce 2s ease infinite">🐟</div>
      <div>
        <h1 class="text-xl font-extrabold text-slate-700 tracking-tight">AutoFish</h1>
        <p class="text-[11px] text-pink-300 font-bold">by Herlove ✨</p>
      </div>
    </div>
    <div id="badge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold bg-slate-100 text-slate-400 border border-slate-200">
      <span id="dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
      <span id="bt">Offline</span>
    </div>
  </div>

  <!-- Preview -->
  <div class="card overflow-hidden">
    <div class="px-4 py-2 bg-blue-50/50 border-b border-blue-100/50 flex items-center justify-between">
      <span class="text-[11px] font-bold text-blue-300">📺 Live Preview</span>
      <span id="fpsL" class="text-[10px] font-mono text-blue-200">— fps</span>
    </div>
    <div class="bg-slate-50 h-28 flex items-center justify-center">
      <img id="prevImg" class="hidden w-full h-full object-contain">
      <p id="prevTxt" class="text-sm text-slate-300 font-semibold">
        Press <kbd class="px-2 py-0.5 bg-blue-100 rounded-lg text-[11px] text-blue-400 font-mono">F6</kbd> to start
      </p>
    </div>
  </div>

  <!-- Keys -->
  <div id="keysRow" class="flex justify-center gap-2 min-h-[42px]"></div>

  <!-- Start -->
  <button id="btnS" onclick="doToggle()"
    class="btn w-full py-3 text-[16px] bg-gradient-to-r from-green-300 to-emerald-300 text-white shadow-lg shadow-green-200/50">
    ▶ Start Fishing!
  </button>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-2">
    <div class="card px-3 py-3 text-center bg-blue-50/50">
      <div class="text-lg">🎯</div>
      <div id="sK" class="text-2xl font-extrabold text-blue-500 font-mono">0</div>
      <div class="text-[9px] text-blue-300 font-bold">Keys</div>
    </div>
    <div class="card px-3 py-3 text-center bg-pink-50/50">
      <div class="text-lg">🐟</div>
      <div id="sF" class="text-2xl font-extrabold text-pink-500 font-mono">0</div>
      <div class="text-[9px] text-pink-300 font-bold">Fish</div>
    </div>
    <div class="card px-3 py-3 text-center bg-amber-50/50">
      <div class="text-lg">⏱️</div>
      <div id="sT" class="text-2xl font-extrabold text-amber-500 font-mono">0:00</div>
      <div class="text-[9px] text-amber-300 font-bold">Time</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card p-4">
    <div class="text-[11px] font-bold text-slate-300 mb-3">🎮 Controls</div>
    <div class="flex gap-2">
      <button onclick="doRegion()" class="btn flex-1 py-2.5 text-[13px] bg-blue-100 text-blue-500 hover:bg-blue-200">📍 Region</button>
      <button onclick="doTest()" class="btn flex-1 py-2.5 text-[13px] bg-amber-100 text-amber-600 hover:bg-amber-200">🔍 Test</button>
      <button onclick="doKey()" class="btn flex-1 py-2.5 text-[13px] bg-purple-100 text-purple-500 hover:bg-purple-200">⌨️ Key</button>
    </div>
    <div class="text-right mt-2">
      <span id="regI" class="text-[10px] font-mono text-slate-300">not set</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="card p-4 space-y-3">
    <div class="text-[11px] font-bold text-slate-300">⚙️ Settings</div>
    <div class="flex items-center justify-between">
      <span class="text-[13px] text-slate-500 font-semibold">Keys per Lane</span>
      <div class="flex items-center gap-2">
        <input type="range" id="rK" min="2" max="10" value="5" class="w-[90px] r-b" oninput="$('vK').textContent=this.value">
        <span id="vK" class="text-[14px] font-mono font-bold text-blue-500 w-4 text-right">5</span>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-[13px] text-slate-500 font-semibold">Key Delay</span>
      <div class="flex items-center gap-2">
        <input type="range" id="rD" min="30" max="200" value="60" class="w-[90px] r-g" oninput="$('vD').textContent=this.value+'ms'">
        <span id="vD" class="text-[14px] font-mono font-bold text-green-500 w-[38px] text-right">60ms</span>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-[13px] text-slate-500 font-semibold">Auto Cast</span>
      <div id="tC" class="tog" onclick="this.classList.toggle('on')"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card overflow-hidden">
    <div class="px-4 py-2 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
      <span class="text-[11px] font-bold text-slate-300">📋 Log</span>
    </div>
    <div id="logBox" class="px-4 py-3 h-[90px] overflow-y-auto text-[11px] text-slate-400 font-mono space-y-0.5">
      <div class="text-slate-300">Waiting for engine... 🐟</div>
    </div>
  </div>

  <div class="text-center text-[9px] text-slate-300 font-semibold pt-1">
    Made with 💖 by Herlove
  </div>
</div>

<script>
const API="http://localhost:8765";
const $=id=>document.getElementById(id);
let running=false;

async function api(p){try{return await(await fetch(API+p)).json()}catch{return null}}

async function doToggle(){
  if(running){await api("/stop");running=false;updateUI(false)}
  else{
    const k=$('rK').value,d=$('rD').value,c=$('tC').classList.contains('on')?1:0;
    const r=await api(`/start?keys=${k}&delay=${d}&cast=${c}`);
    if(r&&r.ok){running=true;updateUI(true)}
    else addLog("Set region first! 📍")
  }
}
async function doRegion(){
  const x=prompt("X:"),y=prompt("Y:"),w=prompt("Width:"),h=prompt("Height:");
  if(x&&y&&w&&h){const r=await api(`/region?x=${x}&y=${y}&w=${w}&h=${h}`);if(r&&r.ok)$('regI').textContent=`${w}x${h}`}
}
async function doTest(){
  const r=await api("/testread");
  if(r&&r.keys&&r.keys.length)showKeys(r.keys);else addLog("Read failed 😢")
}
async function doKey(){addLog("Pressing in 3s... 🎹");setTimeout(()=>api("/testkey"),3000)}

function updateUI(on){
  const b=$('btnS'),bg=$('badge'),d=$('dot'),bt=$('bt');
  if(on){
    b.innerHTML='⏹ Stop';b.className='btn w-full py-3 text-[16px] bg-gradient-to-r from-red-300 to-rose-300 text-white shadow-lg shadow-red-200/50';
    bg.className='flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold bg-green-100 text-green-500 border border-green-200';
    d.className='w-2 h-2 rounded-full bg-green-400 pulse';bt.textContent='Active ✨';
  }else{
    b.innerHTML='▶ Start Fishing!';b.className='btn w-full py-3 text-[16px] bg-gradient-to-r from-green-300 to-emerald-300 text-white shadow-lg shadow-green-200/50';
    bg.className='flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold bg-slate-100 text-slate-400 border border-slate-200';
    d.className='w-2 h-2 rounded-full bg-slate-300';bt.textContent='Offline';
  }
}

function showKeys(c){
  $('keysRow').innerHTML=c.map(k=>
    `<div class="pop w-10 h-10 rounded-2xl bg-blue-100 border-2 border-blue-200 flex items-center justify-center text-blue-600 font-extrabold text-lg font-mono shadow-sm">${k.toUpperCase()}</div>`
  ).join('');
}

function addLog(m){
  const b=$('logBox'),d=document.createElement('div');
  d.textContent=`${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} ${m}`;
  d.className='pop';b.appendChild(d);b.scrollTop=b.scrollHeight;
  while(b.children.length>30)b.removeChild(b.firstChild);
}

async function poll(){
  const s=await api("/status");if(!s)return;
  $('sK').textContent=s.keys;$('sF').textContent=s.fish;$('sT').textContent=s.time;$('fpsL').textContent=s.fps+" fps";
  if(s.last_keys)showKeys(s.last_keys.split(" ").map(k=>k.toLowerCase()));
  if(s.region)$('regI').textContent=`${s.region.width}x${s.region.height}`;
  const lb=$('logBox');lb.innerHTML=s.log.map(l=>`<div>${l}</div>`).join('');lb.scrollTop=lb.scrollHeight;
  const p=await api("/preview");
  if(p&&p.b64){$('prevImg').src="data:image/jpeg;base64,"+p.b64;$('prevImg').classList.remove('hidden');$('prevTxt').classList.add('hidden')}
  if(s.running!==running){running=s.running;updateUI(running)}
}

document.addEventListener('keydown',e=>{if(e.key==='F5'){e.preventDefault();doToggle()}});
setInterval(poll,250);
</script>
</body>
</html>
